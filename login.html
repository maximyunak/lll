<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Dark Souls: Путь Избранного Нежити</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="./images/logohoriz.svg" alt="logo">
        </a>

        <button class="burger" aria-label="Открыть меню">
            <span class="burger-line"></span>
            <span class="burger-line"></span>
            <span class="burger-line"></span>
        </button>

        <nav class="nav">
            <ul class="nav-list">
                <li><a href="#about" class="nav-link">О игре</a></li>
                <li><a href="#stages" class="nav-link">Этапы</a></li>
                <li><a href="#faq" class="nav-link">FAQ</a></li>
            </ul>
            <div class="nav-auth">
                <a href="login.html" class="btn btn-secondary">Вход</a>
                <a href="register.html" class="btn btn-primary">Регистрация</a>
            </div>
        </nav>
    </div>
</header>


<main class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Вход</h1>
            <p>Возвращайся, Избранный Нежить. Твоё путешествие продолжается.</p>
        </div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email" placeholder="ash@lordran.ru" required>
                <span class="form-error"></span>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Пароль</label>
                <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
                <span class="form-error"></span>
            </div>

            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" name="remember">
                    Запомнить меня
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>

        <p class="form-footer">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </p>
    </div>
</main>

<script src="js/main.js"></script>
</body>
</html>
